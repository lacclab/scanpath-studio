name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      # uv resolves + installs the wheel-heavy stack far faster than pip, and
      # its restored cache makes repeat runs near-instant. --system targets the
      # setup-python interpreter for this matrix leg.
      - name: Install package + test deps
        run: uv pip install --system -e ".[test]"

      - name: Run pytest
        # -n auto fans the suite across the runner's cores; the Streamlit
        # AppTest integration tests are CPU-bound app boots and dominate the
        # runtime, so this is a ~3x wall-clock win.
        run: pytest -q -n auto

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check --exclude other_vis .

      - name: ruff format check
        run: ruff format --check --exclude other_vis .
